spring.application.name=orbital-alert

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orbitalalert}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:orbital}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:orbital123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}